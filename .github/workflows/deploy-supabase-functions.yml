name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

concurrency:
  group: supabase-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is required"
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "SUPABASE_DB_PASSWORD secret is required"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve project ref
        id: project
        run: |
          if [ -n "${SUPABASE_PROJECT_ID}" ]; then
            echo "ref=${SUPABASE_PROJECT_ID}" >> "$GITHUB_OUTPUT"
          else
            ref=$(grep -E '^project_id\s*=' supabase/config.toml | head -n1 | cut -d'"' -f2)
            if [ -z "${ref}" ]; then
              echo "Could not resolve project id from secret or supabase/config.toml"
              exit 1
            fi
            echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy database migrations
        run: |
          set -euo pipefail
          ref="${{ steps.project.outputs.ref }}"
          mkdir -p supabase/.temp
          pw_enc=$(jq -rn --arg v "${SUPABASE_DB_PASSWORD}" '$v|@uri')
          tx_pooler_db_url="postgresql://postgres.${ref}:${pw_enc}@aws-1-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require"
          session_pooler_db_url="postgresql://postgres.${ref}:${pw_enc}@aws-1-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require"

          attempts=3
          delay=15
          for i in $(seq 1 "${attempts}"); do
            echo "Running migrations attempt ${i}/${attempts}..."
            if supabase db push --db-url "${tx_pooler_db_url}" --debug; then
              echo "Migrations applied successfully."
              exit 0
            fi
            echo "Transaction pooler failed, trying session pooler..."
            if supabase db push --db-url "${session_pooler_db_url}" --debug; then
              echo "Migrations applied successfully via session pooler."
              exit 0
            fi
            if [ "${i}" -lt "${attempts}" ]; then
              echo "Migration push failed. Retrying in ${delay}s..."
              sleep "${delay}"
            fi
          done

          echo "Migration push failed after ${attempts} attempts."
          exit 1

  deploy-functions:
    needs: deploy-migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      SUPER_ADMIN_IDS: ${{ vars.SUPER_ADMIN_IDS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is required"
            exit 1
          fi
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "TELEGRAM_BOT_TOKEN secret is required"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve project ref
        id: project
        run: |
          if [ -n "${SUPABASE_PROJECT_ID}" ]; then
            echo "ref=${SUPABASE_PROJECT_ID}" >> "$GITHUB_OUTPUT"
          else
            ref=$(grep -E '^project_id\s*=' supabase/config.toml | head -n1 | cut -d'"' -f2)
            if [ -z "${ref}" ]; then
              echo "Could not resolve project id from secret or supabase/config.toml"
              exit 1
            fi
            echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync function secrets
        run: |
          if [ -n "${SUPER_ADMIN_IDS}" ]; then
            supabase secrets set \
              TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}" \
              SUPER_ADMIN_IDS="${SUPER_ADMIN_IDS}" \
              --project-ref "${{ steps.project.outputs.ref }}"
          else
            supabase secrets set \
              TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}" \
              --project-ref "${{ steps.project.outputs.ref }}"
          fi

      - name: Deploy all edge functions
        run: |
          set -euo pipefail
          for dir in supabase/functions/*; do
            [ -d "${dir}" ] || continue
            fn="$(basename "${dir}")"
            echo "Deploying function: ${fn}"
            supabase functions deploy "${fn}" --project-ref "${{ steps.project.outputs.ref }}"
          done

      - name: Set Telegram webhook
        run: |
          set -euo pipefail
          WEBHOOK_URL="https://${{ steps.project.outputs.ref }}.functions.supabase.co/telegram-bot"
          echo "Setting webhook to: ${WEBHOOK_URL}"
          RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${WEBHOOK_URL}\",\"drop_pending_updates\":false}")
          echo "${RESPONSE}"
          echo "${RESPONSE}" | grep -q '"ok":true'

      - name: Verify Telegram webhook
        run: |
          set -euo pipefail
          INFO=$(curl -sS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo")
          echo "${INFO}"
