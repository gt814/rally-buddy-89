name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

concurrency:
  group: supabase-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is required"
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "SUPABASE_DB_PASSWORD secret is required"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve project ref
        id: project
        run: |
          if [ -n "${SUPABASE_PROJECT_ID}" ]; then
            echo "ref=${SUPABASE_PROJECT_ID}" >> "$GITHUB_OUTPUT"
          else
            ref=$(grep -E '^project_id\s*=' supabase/config.toml | head -n1 | cut -d'"' -f2)
            if [ -z "${ref}" ]; then
              echo "Could not resolve project id from secret or supabase/config.toml"
              exit 1
            fi
            echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy database migrations
        run: |
          supabase db push \
            --project-ref "${{ steps.project.outputs.ref }}" \
            --password "${SUPABASE_DB_PASSWORD}"

  deploy-functions:
    needs: deploy-migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is required"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve project ref
        id: project
        run: |
          if [ -n "${SUPABASE_PROJECT_ID}" ]; then
            echo "ref=${SUPABASE_PROJECT_ID}" >> "$GITHUB_OUTPUT"
          else
            ref=$(grep -E '^project_id\s*=' supabase/config.toml | head -n1 | cut -d'"' -f2)
            if [ -z "${ref}" ]; then
              echo "Could not resolve project id from secret or supabase/config.toml"
              exit 1
            fi
            echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy all edge functions
        run: |
          set -euo pipefail
          for dir in supabase/functions/*; do
            [ -d "${dir}" ] || continue
            fn="$(basename "${dir}")"
            echo "Deploying function: ${fn}"
            supabase functions deploy "${fn}" --project-ref "${{ steps.project.outputs.ref }}"
          done
